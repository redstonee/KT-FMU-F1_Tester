; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:genericSTM32H743VI]
platform = ststm32
board = genericSTM32H743VI
framework = arduino
debug_tool = cmsis-dap
upload_protocol = cmsis-dap
monitor_speed = 115200
build_unflags = -std=gnu++11 -std=gnu++14 -std=gnu++17
build_flags = 
	-std=gnu++2a
	-DUSE_PWR_LDO_SUPPLY
	-DULOG_ENABLED
	-DENABLE_HWSERIAL1
	-DENABLE_HWSERIAL2
	-DENABLE_HWSERIAL3
	-DENABLE_HWSERIAL6
	-DENABLE_HWSERIAL7
	-DENABLE_HWSERIAL8
    -DUSBCON
    -DUSBD_USE_CDC
lib_deps = 
	adafruit/Adafruit DPS310@^1.1.6
	bolderflight/Bolder Flight Systems BMI088@^1.0.1
	sparkfun/SparkFun BMI270 Arduino Library@^1.0.3
